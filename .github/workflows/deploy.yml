name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VPS_PATH: /var/www/portfolio
  REPO_URL: https://github.com/maton111/portfolio.git
  PM2_APP_NAME: portfolio-api

jobs:
  deploy:
    name: Deploy Portfolio
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: read

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Deploy Application
        shell: bash
        env:
          ENV_FILE_PROD: ${{ secrets.ENV_FILE_PROD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          API_PORT: ${{ secrets.API_PORT }}
          HEALTHCHECK_PUBLIC_URL: ${{ secrets.HEALTHCHECK_PUBLIC_URL }}
        run: |
          set -euo pipefail

          API_PORT="${API_PORT:-4307}"

          echo "========================================="
          echo "🚀 PORTFOLIO DEPLOYMENT STARTED"
          echo "========================================="

          mkdir -p "${VPS_PATH}"

          if [ ! -d "${VPS_PATH}/.git" ]; then
            echo "📥 First deploy: cloning repository..."
            git clone "${REPO_URL}" "${VPS_PATH}"
          fi

          cd "${VPS_PATH}"

          echo "📥 Pulling latest code from ${REPO_URL}..."
          git remote set-url origin "${REPO_URL}"
          git fetch origin main --prune
          git reset --hard origin/main

          echo "🔐 Writing production .env..."
          if [ -n "${ENV_FILE_PROD:-}" ]; then
            printf "%s\n" "${ENV_FILE_PROD}" > .env
          else
            : > .env
            echo "GMAIL_USER=${GMAIL_USER}" >> .env
            echo "GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}" >> .env
            echo "GMAIL_TO=${GMAIL_TO}" >> .env
            echo "SERVER_PORT=${API_PORT}" >> .env
            echo "NODE_ENV=production" >> .env
            echo "CORS_ORIGIN=${CORS_ORIGIN}" >> .env
          fi

          echo "📦 Installing dependencies..."
          npm ci

          echo "🔨 Building frontend..."
          npm run build

          echo "🔄 Restarting API with PM2..."
          pm2 restart "${PM2_APP_NAME}" || pm2 start ecosystem.config.json --name "${PM2_APP_NAME}"
          pm2 save

          echo "🌐 Reloading Nginx..."
          sudo systemctl reload nginx

          echo "--------------------------"
          echo "🔍 DEPLOYMENT VERIFICATION"
          echo "--------------------------"

          sleep 3

          if pm2 describe "${PM2_APP_NAME}" >/dev/null 2>&1; then
            echo "✅ PM2 app ${PM2_APP_NAME}: RUNNING"
          else
            echo "❌ PM2 app ${PM2_APP_NAME}: NOT FOUND"
            exit 1
          fi

          if sudo systemctl is-active --quiet nginx; then
            echo "✅ Nginx service: RUNNING"
          else
            echo "❌ Nginx service: FAILED"
            exit 1
          fi

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:${API_PORT}/api/health" || echo "000")
          if [ "${HTTP_CODE}" = "200" ]; then
            echo "✅ Local API health: OK (HTTP ${HTTP_CODE})"
          else
            echo "❌ Local API health: FAILED (HTTP ${HTTP_CODE})"
            exit 1
          fi

          if [ -n "${HEALTHCHECK_PUBLIC_URL:-}" ]; then
            PUBLIC_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${HEALTHCHECK_PUBLIC_URL}" || echo "000")
            if [ "${PUBLIC_HTTP_CODE}" = "200" ]; then
              echo "✅ Public health: OK (HTTP ${PUBLIC_HTTP_CODE})"
            else
              echo "⚠️ Public health unexpected (HTTP ${PUBLIC_HTTP_CODE}) on ${HEALTHCHECK_PUBLIC_URL}"
            fi
          fi

          echo ""
          echo "========================================="
          echo "🎉 DEPLOYMENT COMPLETED SUCCESSFULLY!"
          echo "========================================="

      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Deployment completed successfully"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed"
          echo "Check job logs for details"
