name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master

env:
  VPS_USER: ${{ secrets.VPS_USER }}
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_PATH: /var/www/portfolio
  PROJECT_NAME: portfolio

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ${{ env.VPS_PATH }}
            
            # Pull latest code
            git pull origin main
            
            # Install dependencies
            npm ci --production
            
            # Build frontend
            npm run build
            
            # Restart API server with PM2
            pm2 restart portfolio-api || pm2 start ecosystem.config.json --name portfolio-api
            pm2 save
            
            # Reload Nginx
            sudo systemctl reload nginx
            
            echo "✅ Deployment successful!"

      - name: Notify Slack (optional)
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Portfolio deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Portfolio Deploy* - ${{ job.status }}\nBranch: main\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }

